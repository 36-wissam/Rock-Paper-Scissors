<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Rock Paper Scissors</title>
</head>
<body>

    <div class="game">
        <!-- name header -->
        <div class="heder">
            <h1>Rock Paper Scissors</h1>
        </div>


        <!-- player vs computer score section -->
        <div class="statusChoice">
            <p id="playerChoice">PLAYER :</p>
            <p id="computerChoice">COMPUTER :</p>
        </div>

        <div class="paragraphtext">
            <p id="paragraphtext">CHOOCE YOUR WEAPON</p>
        </div>

        <div class="score">
            <p id="playerscore">YOURE SCORE :</p>
            <p><strong><em>VS</em></strong></p>
            <p id="compscore">COMPUTER SCORE :</p>
        </div>
        <!-- Rock Paper Scissors buttons -->
        <div class="gameBtns">
            <button id="rockBtn" value="rock"><img src="src/rock.png" alt="rock button" width="75px" height="75px"></button>
            <button id="paperBtn" value="paper"><img src="src/paper.png" alt="paper button" width="75px" height="75px"></button>
            <button id="scissorBtn" value="scissor"><img src="src/Scissors.png" alt="scissors button" width="75px" height="75px"></button>
        </div>
 
        <!-- for the hands logo -->
        <div class="footer">
            <img src="src/LOGO.png" alt="" width="300px">
        </div>





        

    </div>
    <script src="script.js"></script>
</body>
</html>
